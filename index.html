  <title>ماجد عنقاوي</title>

  <style>
    /* ── Gumela Font Face ── */
    @font-face {
      font-family: 'Gumela';
      src: url('fonts/gumela-arabic-light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gumela';
      src: url('fonts/gumela-arabic-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Gumela';
      src: url('fonts/gumela-arabic-bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --bg:               #07070f;
      --gold:             #c9973a;
      --gold-bright:      #e8b84b;
      --gold-dim:         #8a6420;
      --cream:            #f0e8d5;
      --muted:            #7a7060;
      --card-bg:          rgba(255, 255, 255, 0.03);
      --card-border:      rgba(201, 151, 58, 0.12);
      --card-hover:       rgba(201, 151, 58, 0.07);
      --card-border-hover:rgba(201, 151, 58, 0.45);
    }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Gumela', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .glow-orb {
      position: fixed;
      top: -15vh; left: 50%;
      transform: translateX(-50%);
      width: 70vw; height: 70vw;
      max-width: 600px; max-height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,151,58,0.13) 0%, rgba(201,151,58,0.04) 45%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(18px);
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 72px 24px 80px;
    }

    .profile {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    .avatar-wrap { position: relative; width: 110px; height: 110px; margin-bottom: 28px; }

    .avatar-ring {
      position: absolute; inset: -7px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,151,58,0.35);
      animation: rotateRing 18s linear infinite;
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold-bright);
      box-shadow: 0 0 12px 4px rgba(232,184,75,0.85);
    }

    .avatar-ring-outer {
      position: absolute; inset: -14px;
      border-radius: 50%;
      border: 1px solid rgba(201,151,58,0.10);
      animation: rotateRing 34s linear infinite reverse;
    }
    .avatar-ring-outer::before {
      content: '';
      position: absolute;
      bottom: -2px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px 2px rgba(201,151,58,0.6);
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(201,151,58,0.25);
      box-shadow: 0 0 36px rgba(201,151,58,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
      background: #1a1408;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      mix-blend-mode: luminosity;
      filter: contrast(1.1) brightness(0.92);
      display: block;
    }
    .avatar-fallback {
      font-family: 'Gumela', sans-serif;
      font-size: 28px; font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--gold-bright);
      text-shadow: 0 0 20px rgba(232,184,75,0.6);
      display: none;
    }

    .name {
      font-family: 'Gumela', sans-serif;
      font-size: clamp(34px, 9vw, 52px);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--cream);
      text-align: center;
      line-height: 1.1;
    }
    .name span {
      color: var(--gold-bright);
      text-shadow: 0 0 28px rgba(232,184,75,0.25);
    }

    .subtitle {
      margin-top: 11px;
      font-family: 'Gumela', sans-serif;
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
    .subtitle .dot { color: var(--gold-dim); margin: 0 4px; font-weight: 400; }

    .divider {
      width: 44px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 22px 0;
    }

    .bio {
      font-family: 'Gumela', sans-serif;
      font-size: 16px; font-weight: 300;
      color: rgba(240,232,213,0.45);
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    .links {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 12px;
      margin-top: 44px;
    }

    .link-card {
      position: relative;
      display: flex; align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--cream);
      transition:
        background 0.3s ease, border-color 0.3s ease,
        transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease;
      overflow: hidden;
      opacity: 0; transform: translateY(18px);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .link-card.show { animation: fadeUp 0.75s cubic-bezier(0.22,1,0.36,1) forwards; }

    .link-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,151,58,0.05) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s ease;
    }

    .link-card:hover {
      background: var(--card-hover);
      border-color: var(--card-border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,151,58,0.1), 0 0 24px rgba(201,151,58,0.06);
    }
    .link-card:hover::before { opacity: 1; }
    .link-card:active { transform: translateY(0px) scale(0.99); }

    .link-icon {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(201,151,58,0.08);
      border: 1px solid rgba(201,151,58,0.15);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, border-color 0.3s;
    }
    .link-card:hover .link-icon {
      background: rgba(201,151,58,0.14);
      border-color: rgba(201,151,58,0.3);
    }
    .link-icon svg { width: 20px; height: 20px; fill: var(--gold); transition: fill 0.3s; }
    .link-card:hover .link-icon svg { fill: var(--gold-bright); }
    .link-icon .emoji { font-size: 20px; line-height: 1; }

    .link-text { flex: 1; }
    .link-label {
      font-family: 'Gumela', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--cream);
      text-transform: uppercase;
    }
    .link-sub {
      margin-top: 3px;
      font-family: 'Gumela', sans-serif;
      font-size: 11px; font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .link-arrow {
      flex-shrink: 0;
      width: 18px; height: 18px;
      opacity: 0.3;
      transition: opacity 0.25s, transform 0.25s;
      transform: scaleX(-1);
    }
    .link-card:hover .link-arrow {
      opacity: 0.7;
      transform: scaleX(-1) translateX(-3px);
    }

    .footer {
      margin-top: 60px;
      font-family: 'Gumela', sans-serif;
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(122,112,96,0.35);
      opacity: 0;
      animation: fadeUp 0.8s ease 1.5s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    @media (max-width: 480px) {
      .page { padding: 56px 20px 64px; }
      .subtitle { font-size: 9.5px; letter-spacing: 0.12em; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div class="glow-orb"></div>

  <main class="page">

    <div class="profile">
      <div class="avatar-wrap">
        <div class="avatar-ring-outer"></div>
        <div class="avatar-ring"></div>
        <div class="avatar">
          <img id="avatar-img"
            src="images/profile.jpg"

          />

      <h1 class="name" id="name">ماجد <span>عنقاوي</span></h1>

      <p class="subtitle" id="subtitle">
        مدير إبداعي
        <span class="dot">·</span>
        متخصص إبداعي في الذكاء الاصطناعي
        <span class="dot">·</span>
        معلّم ومرشد
      </p>

      <div class="divider"></div>

      <p class="bio" id="bio">المستقبل .. تُخطّه أناملُ المبدعين</p>
    </div>

    <nav class="links" id="links"></nav>

    <p class="footer">© ماجد عنقاوي — ٢٠٢٦</p>

  </main>

  <script>
    // ── Dashboard API config ──
    const API = 'https://api.malearnsa.com';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznjcsYu8gLDZqFJGededAQaATad_L8vlhRQV04pOqh57HB5nFVRy9zUHAcg6goyj8DKA/exec';

    // ── Icon registry (SVG path snippets keyed by Icon field value) ──

      instagram: '<path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>',
      whatsapp: '<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>',

      youtube: '<path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>',
    };

    function iconHtml(iconName) {
      const path = ICON_SVGS[String(iconName || '').toLowerCase()];
      if (path) return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${path}</svg>`;
      if (iconName) return `<span class="emoji">${iconName}</span>`;
      return ICON_SVGS.malearn ? `<svg viewBox="0 0 24 24">${ICON_SVGS.malearn}</svg>` : '';
    }

    const ARROW_SVG = '<svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

    async function render() {
      try {
        const res = await fetch(API + '/api/public/linkbio');
        const { items, header } = await res.json();

        // Header (photo / name / subtitle / bio) — update if sheet provides values.
        if (header.photoURL) document.getElementById('avatar-img').src = header.photoURL;
        if (header.nameAR)    document.getElementById('name').innerHTML = header.nameAR;
        if (header.subtitleAR) {
          const formatted = header.subtitleAR.split(/\s*·\s*/).join('<span class="dot">·</span>');
          document.getElementById('subtitle').innerHTML = formatted;
        }
        if (header.bioAR)     document.getElementById('bio').textContent = header.bioAR;

        // Links
        const container = document.getElementById('links');
        container.innerHTML = '';
        items.forEach((link, i) => {
          const a = document.createElement('a');
          a.className = 'link-card show';
          a.style.animationDelay = (0.55 + i * 0.17) + 's';
          a.href = link.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.dataset.id = link.linkId;
          a.innerHTML = `
            <div class="link-icon">${iconHtml(link.icon)}</div>
            <div class="link-text">
              <div class="link-label">${escapeHtml(link.titleAR || link.titleEN)}</div>
              ${link.description ? `<div class="link-sub">${escapeHtml(link.description)}</div>` : ''}
            </div>
            ${ARROW_SVG}`;
          a.addEventListener('click', () => {
            // Fire-and-forget click tracking
            try {
              const body = new URLSearchParams({ action: 'admin_increment_linkbio_click', link_id: link.linkId });
              navigator.sendBeacon?.(APPS_SCRIPT_URL, new Blob([body.toString()], { type: 'application/x-www-form-urlencoded' }));
            } catch {}
          });
          container.appendChild(a);
        });
      } catch (e) {
        // Fallback: if API fails, leave default HTML as-is so page isn't blank.
        console.warn('linkbio fetch failed, falling back to static', e);
      }
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    render();
  </script>

  <script>
    // ── Floating particle system ──
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const GOLD  = [201, 151, 58];
    const CREAM = [240, 232, 213];

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function rand(a, b) { return a + Math.random() * (b - a); }

    function spawnParticle() {
      const color = Math.random() > 0.6 ? CREAM : GOLD;
      return {
        x: rand(0, W), y: rand(0, H),
        r: rand(0.4, 1.6),
        vx: rand(-0.08, 0.08), vy: rand(-0.18, -0.04),
        alpha: rand(0.1, 0.55),
        fadeSpeed: rand(0.001, 0.003), fadeDir: 1, color
      };
    }

    function init() { resize(); particles = Array.from({ length: 80 }, spawnParticle); }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        p.alpha += p.fadeSpeed * p.fadeDir;
        if (p.alpha >= 0.55 || p.alpha <= 0.05) p.fadeDir *= -1;
        if (p.y < -10) { Object.assign(p, spawnParticle(), { y: H + 10 }); }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color.join(',')},${p.alpha.toFixed(3)})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init(); draw();
  </script>
